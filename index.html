<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THTSCShop - Bảo trì</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial, sans-serif;
    color:white;
}

.container{
    text-align:center;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

p{
    opacity:0.8;
}

/* Gear animation */

.gear{
    width:90px;
    height:90px;
    border:10px solid #3b82f6;
    border-radius:50%;
    position:relative;
    margin:40px auto;
    animation:spin 4s linear infinite;
}

.gear:before,
.gear:after{
    content:"";
    position:absolute;
    background:#3b82f6;
}

.gear:before{
    width:140px;
    height:14px;
    top:50%;
    left:-25px;
    transform:translateY(-50%);
}

.gear:after{
    height:140px;
    width:14px;
    left:50%;
    top:-25px;
    transform:translateX(-50%);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* dots animation */

.dots span{
    animation:blink 1.4s infinite;
}

.dots span:nth-child(2){
    animation-delay:0.2s;
}

.dots span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes blink{
    0%,80%,100%{opacity:0}
    40%{opacity:1}
}

</style>
</head>

<body>

<div class="container">

<h1>THTSCShop đang bảo trì</h1>

<div class="gear"></div>

<p>Hệ thống đang được nâng cấp. Vui lòng quay lại sau.</p>

<p class="dots">Đang cập nhật<span>.</span><span>.</span><span>.</span></p>

</div>

</body>
</html>
