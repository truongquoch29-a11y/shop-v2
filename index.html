<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THTSCSHOP - Bảo trì hệ thống</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#020617,#0f172a,#1e293b,#020617);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
color:white;
overflow:hidden;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 0 50px rgba(0,0,0,0.7);
max-width:500px;
width:90%;
}

/* LOGO SỬA Ở ĐÂY */

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:110px;
height:110px;
object-fit:cover;
border-radius:50%;
background:black;
border:3px solid rgba(255,255,255,0.15);
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* text */

h1{
font-size:32px;
margin-bottom:10px;
}

h2{
font-weight:500;
margin-bottom:15px;
}

p{
opacity:0.85;
line-height:1.5;
margin-bottom:25px;
}

/* gear frame */

.gear-box{
width:110px;
height:110px;
margin:0 auto 25px auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
border:2px solid rgba(255,255,255,0.2);
box-shadow:0 0 25px rgba(0,0,0,0.6) inset;
}

.gear{
font-size:48px;
animation:spin 4s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.footer{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

.links{
margin-top:12px;
}

.links a{
display:inline-block;
margin:0 10px;
font-size:22px;
color:white;
text-decoration:none;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.3s;
}

.links a:hover{
transform:translateY(-3px);
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* POPUP */

.popup{
position:fixed;
bottom:20px;
right:20px;
background:#0f172a;
border:1px solid rgba(255,255,255,0.15);
padding:14px 18px;
border-radius:12px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
font-size:14px;
opacity:0;
transform:translateY(40px);
animation:popupAnimation 5s forwards;
}

@keyframes popupAnimation{

0%{
opacity:0;
transform:translateY(40px);
}

10%{
opacity:1;
transform:translateY(0);
}

85%{
opacity:1;
transform:translateY(0);
}

100%{
opacity:0;
transform:translateY(40px);
}

}

/* icon loa */

.speaker{
font-size:18px;
color:#60a5fa;
animation:sound 1.2s infinite;
}

@keyframes sound{
0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="images/circle_logo.jpg">
</div>

<h1>THTSCSHOP</h1>
<h2>Hệ thống đang bảo trì</h2>

<p>Website đang được nâng cấp để mang lại trải nghiệm tốt hơn. Vui lòng quay lại sau.</p>

<div class="gear-box">
<i class="fa-solid fa-gear gear"></i>
</div>

<div class="footer">

<div>© 2026 THTSCShop</div>

<div class="links">

<a href="https://www.facebook.com/share/1Q8MGeMzvT/?mibextid=wwXIfr" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="https://zalo.me/0702093263" target="_blank">
<i class="fa-solid fa-comment"></i>
</a>

</div>

</div>

</div>

<div class="popup">
<i class="fa-solid fa-bullhorn speaker"></i>
<span>Shop đang bảo trì, hãy liên hệ hỗ trợ</span>
</div>

</body>
</html>
